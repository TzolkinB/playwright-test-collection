version: 2
updates:
  # NPM dependencies - weekly with grouped updates
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    # Groups define how Dependabot creates PRs for different update types
    groups:
      # minor + patch updates in one PR
      # applies-to is version updated by default so does not need to be specified
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # major updates get individual PR
      major-updates:
        patterns:
          - '*'
        update-types:
          - 'major'
      # security updates get individual PR and are labeled as security updates
      # applies-to: "security-updates" ensures this only applies to security vulnerabilities
      security-updates:
        patterns:
          - '*'
        applies-to: 'security-updates'
    # Rebase PRs to speed up dependency resolution
    rebase-strategy: 'auto'
    # Maximum of 5 open PRs at any time
    open-pull-requests-limit: 5

  # GitHub Actions - alerts only, no auto-updates
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
